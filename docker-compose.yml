services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: rentgenai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - db_data_pg18:/var/lib/postgresql
      - ./Backend/sql/rentgenai.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentgenai"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=rentgenai;Username=postgres;Password=admin
      Jwt__Issuer: SutarciuKontroleSistema
      Jwt__Audience: SutarciuKontroleSistema
      Jwt__Key: ${JWT_KEY:-K5kQv4e2fPz8Yt1Rk9M3sV7aB1cN6xD4pF0gH3jL8qT2wZ7rU5iO1mE9sC6vB3nP}
      Jwt__AccessTokenMinutes: 15
      Jwt__RefreshTokenDays: 7
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    ports:
      - "5158:8080"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data_pg18:
  uploads:
